<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myakiba - Collection Manager for Japanese Collectables</title>

    <meta
      name="description"
      content="myakiba is a collection management tool for Japanese pop-culture goods. Track your collection, orders, analytics, and expenses with a modern interface."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="myakiba - Collection Manager for Japanese Collectables" />
    <meta
      property="og:description"
      content="myakiba is a collection management tool for Japanese pop-culture goods. Track your collection, orders, analytics, and expenses with a modern interface."
    />
    <meta property="og:url" content="https://myakiba.app" />
    <meta property="og:site_name" content="myakiba" />
    <meta property="og:image" content="https://myakiba.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://myakiba.app" />
    <meta name="twitter:title" content="myakiba - Collection Manager for Japanese Collectables" />
    <meta
      name="twitter:description"
      content="myakiba is a collection management tool for Japanese pop-culture goods. Track your collection, orders, analytics, and expenses with a modern interface."
    />
    <meta name="twitter:image" content="https://myakiba.app/og-image.png" />
    <meta name="twitter:image:width" content="1200" />
    <meta name="twitter:image:height" content="630" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://myakiba.app" />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en" href="https://myakiba.app" />
    <link rel="alternate" hreflang="x-default" href="https://myakiba.app" />

    <!-- Prevent flash of white by applying theme before first paint -->
    <script>
      (function () {
        var t = localStorage.getItem("vite-ui-theme") || "dark";
        if (t === "system")
          t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.classList.add(t);
      })();
    </script>
    <style>
      html.dark {
        background-color: oklch(0.145 0 0);
      }
      html.light {
        background-color: oklch(1 0 0);
      }
    </style>

    <!-- Preload critical hero images -->
    <link rel="preload" as="image" type="image/webp" href="/hero-bg.webp" />
    <link rel="preload" as="image" type="image/webp" href="/dashboard-dark.webp" />

    <!-- Schema.org -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "myakiba",
        "url": "https://myakiba.app"
      }
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
