name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting and lint
        run: bun run check

      - name: Check types
        run: bunx turbo run check-types

  build-images:
    name: Publish ${{ matrix.image }} image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            dockerfile: apps/server/Dockerfile
            build_args: |
              SOURCE_COMMIT=${{ github.sha }}
              VITE_SERVER_URL=${{ vars.VITE_SERVER_URL }}
              VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY }}
          - image: worker
            dockerfile: apps/worker/Dockerfile
            build_args: ""
          - image: db-push
            dockerfile: packages/db/Dockerfile
            build_args: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate server build variables
        if: matrix.image == 'server'
        shell: bash
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
        run: |
          test -n "$VITE_SERVER_URL" || { echo "::error::VITE_SERVER_URL is required."; exit 1; }
          test -n "$VITE_TURNSTILE_SITE_KEY" || { echo "::error::VITE_TURNSTILE_SITE_KEY is required."; exit 1; }

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          pull: true
          tags: |
            ${{ steps.image.outputs.name }}:main
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy to Coolify
    if: ${{ vars.COOLIFY_DEPLOY_ENABLED == 'true' }}
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request GET "$COOLIFY_WEBHOOK" \
            --header "Authorization: Bearer $COOLIFY_TOKEN"
